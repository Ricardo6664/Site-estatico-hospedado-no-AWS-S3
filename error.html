<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #c8a96e;
      --accent-dim: rgba(200, 169, 110, 0.12);
      --text: #e8e3d8;
      --text-muted: #6b6560;
      --text-faint: #1a1815;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* Giant 404 background text */
    .bg-number {
      position: fixed;
      font-family: 'Playfair Display', serif;
      font-size: clamp(18rem, 40vw, 38rem);
      font-weight: 900;
      color: var(--text-faint);
      letter-spacing: -0.05em;
      user-select: none;
      pointer-events: none;
      line-height: 1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Orbiting ring */
    .orbit-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      pointer-events: none;
      z-index: 1;
      animation: spin 80s linear infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
    }

    .orbit-dot {
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .error-eyebrow::before,
    .error-eyebrow::after {
      content: '';
      display: block;
      width: 1.5rem;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .error-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.8;
      max-width: 26rem;
      margin: 0 auto 2.5rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 1.75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--accent);
      cursor: pointer;
      transition: background 0.3s, color 0.3s, transform 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 500;
    }

    .btn-primary:hover {
      background: transparent;
      color: var(--accent);
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--accent);
    }

    .btn-ghost:hover {
      background: var(--accent-dim);
      transform: translateY(-2px);
    }

    /* Nav link */
    .top-nav {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }

    .top-nav a {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .top-nav a span { color: var(--accent); }

    /* Error code subtle badge */
    .error-badge {
      display: inline-block;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0.3rem 0.75rem;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    @media (max-width: 600px) {
      .orbit-container { width: 340px; height: 340px; }
      .bg-number { font-size: 50vw; }
    }
  </style>
</head>
<body>

  <!-- Logo no topo -->
  <div class="top-nav">
    <a href="/">Meu<span>.</span>Site</a>
  </div>

  <!-- Fundo decorativo -->
  <div class="bg-number" aria-hidden="true">404</div>

  <div class="orbit-container" aria-hidden="true">
    <div class="orbit-ring">
      <div class="orbit-dot"></div>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <main class="content" role="main">
    <div class="error-eyebrow">Erro 404</div>
    <div class="error-badge">Página não encontrada</div>
    <h1>Parece que você<br />se perdeu no <em>caminho.</em></h1>
    <p class="error-desc">
      A página que você está procurando não existe, foi movida ou o endereço foi digitado incorretamente.
    </p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Voltar ao início</a>
      <a href="javascript:history.back()" class="btn btn-ghost">Página anterior</a>
    </div>
  </main>

</body>
</html>
